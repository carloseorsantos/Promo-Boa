name: CI

on:
  push:
    branches: [main, claude/plan-promoboa-app-lQeTt]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @promo-boa/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check (shared)
        run: pnpm --filter @promo-boa/shared exec tsc --noEmit

      - name: Type check (API)
        run: pnpm --filter @promo-boa/api exec tsc --noEmit

      - name: Type check (portal)
        run: pnpm --filter @promo-boa/portal exec tsc --noEmit

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: promoboa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @promo-boa/api exec prisma generate

      - name: Run API tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/promoboa_test
          JWT_ACCESS_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          JWT_PORTAL_SECRET: test_portal_secret
        run: pnpm test
